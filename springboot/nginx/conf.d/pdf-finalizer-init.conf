# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 ONLY — used during the initial Let's Encrypt certificate issuance.
# After the cert is issued, REPLACE this file with pdf-finalizer.conf
# (rename: mv pdf-finalizer-init.conf pdf-finalizer.conf) then reload nginx.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name supdf.suplo.my.id;

    # Let's Encrypt ACME challenge — certbot writes files here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: reject (no plain-HTTP access before cert is issued).
    location / {
        return 444;
    }
}
