# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — full config after the Let's Encrypt cert has been issued.
# Replace pdf-finalizer-init.conf with this file, then: docker compose restart nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect plain HTTP → HTTPS (also serves ACME renewal challenges).
server {
    listen 80;
    server_name supdf.suplo.my.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — the endpoint Salesforce calls.
server {
    listen 443 ssl;
    http2 on;
    server_name supdf.suplo.my.id;

    # Let's Encrypt certificates (issued by certbot container).
    ssl_certificate     /etc/letsencrypt/live/supdf.suplo.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supdf.suplo.my.id/privkey.pem;

    # Modern TLS only — Salesforce requires TLS 1.2+.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Timeouts — PDF generation can take a few seconds on complex forms.
    proxy_connect_timeout   10s;
    proxy_read_timeout     120s;   # matches the Apex callout timeout
    proxy_send_timeout      30s;

    # Security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Only expose the finalize API — nothing else is public.
    location /api/v1/forms/ {
        proxy_pass         http://pdf-finalizer:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Body size — base64-encoded signature images can be large.
        client_max_body_size 20m;
    }

    # Block everything else.
    location / {
        return 404;
    }
}
